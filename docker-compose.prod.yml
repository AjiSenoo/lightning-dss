# Production stack for a single VPS (shared with other workloads).
#
#   cp .env.example .env   # then edit secrets/host
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Everything is served through nginx on ${HTTP_PORT} (default 8080), so it won't
# collide with anything already on :80/:443. The SPA calls /api same-origin.
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lightning_dss}
      POSTGRES_USER: ${POSTGRES_USER:-lightning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port published — Postgres is only reachable on the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lightning}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env
    environment:
      # Constructed from the POSTGRES_* vars; overrides any DATABASE_URL in .env.
      DATABASE_URL: postgres://${POSTGRES_USER:-lightning}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lightning_dss}
      # Process/log timezone (WIB). Overridable at runtime without a rebuild.
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 768M

  nginx:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    # No host port published — reachable only on the internal compose network.
    # Caddy terminates TLS on :443 and reverse-proxies to nginx:80; all public
    # access is HTTPS (plain-HTTP :8080 intentionally removed).
    expose:
      - "80"
    volumes:
      - static:/vol/static:ro
      - media:/vol/media:ro
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 128M

  # Edge TLS terminator: automatic Let's Encrypt certs for ${SITE_ADDRESS},
  # http->https redirect, then reverse-proxy to nginx. Needs public :80 + :443.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  static:
  media:
  caddy_data:
  caddy_config:
