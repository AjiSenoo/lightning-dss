upstream django {
    server web:8000;
}

# Honour the X-Forwarded-Proto set by an upstream TLS terminator (Caddy) so
# Django sees the real external scheme (https); fall back to our own scheme
# for direct/plain-HTTP access.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~.+"   $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    # Inspection photo uploads — keep in sync with any backend upload limits.
    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # Django REST API
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Collected Django/admin/DRF static assets and uploaded media (shared volumes)
    location /static/ { alias /vol/static/; access_log off; expires 7d; }
    location /media/  { alias /vol/media/;  access_log off; expires 7d; }

    # SPA fallback — let React Router handle client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
